spring.application.name=PortfolioWeb
server.port=8080

# 禁用数据库自动配置（不需要数据库）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# 数据库配置（已禁用）
#spring.datasource.url=jdbc:mysql://localhost:3306/example_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=admin
#spring.datasource.password=password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 静态资源配置
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

spring.devtools.restart.enabled=true

# 邮件配置（请根据需要修改为您的邮箱配置
# Gmail 配置示例：
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=flora.r.0571@gmail.com
# 注意：Gmail 需要使用应用专用密码，不是登录密码
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# 收件人邮箱
portfolio.email.to=flora.r.0571@gmail.com
